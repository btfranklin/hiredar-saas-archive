{% extends 'base.html' %}
{% load i18n %}

{% block title %}Password Changed | Hiredar{% endblock %}

{% block content %}
<div class="hero min-h-screen bg-base-200">
    <div class="hero-content flex-col">
        <div class="card flex-shrink-0 w-full max-w-md shadow-2xl bg-base-100">
            <div class="card-body">
                <h2 class="text-2xl font-bold text-center mb-4">{% trans "Password Changed" %}</h2>
                
                <div class="alert alert-success mb-6">
                    <svg xmlns="http://www.w3.org/2000/svg" class="stroke-current shrink-0 h-6 w-6" fill="none" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                    <span>{% trans "Your password has been changed successfully." %}</span>
                </div>
                
                <div class="text-center">
                    <a href="{% url 'account_login' %}" class="btn btn-primary">{% trans "Sign In" %}</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
