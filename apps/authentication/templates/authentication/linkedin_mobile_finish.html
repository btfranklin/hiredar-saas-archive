<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>LinkedIn Mobile Finish</title>
</head>
<body>
<script>
    const urlParams = new URLSearchParams(location.search);
    if (urlParams.has('code')) {
        fetch('/api/auth/linkedin/mobile-finish', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                code: urlParams.get('code'),
                code_verifier: sessionStorage.getItem('li_code_verifier'),
                user_type: sessionStorage.getItem('li_user_type')
            })
        }).then(() => {
            const userType = sessionStorage.getItem('li_user_type');
            const redirectTo = userType === 'job_seeker'
                ? '/job-seekers/dashboard/'
                : '/recruiters/dashboard/';
            window.location = redirectTo;
        });
    }
</script>
<p>Finishing LinkedIn login...</p>
</body>
</html>
