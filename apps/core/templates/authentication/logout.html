{% extends 'base.html' %}
{% load i18n %}

{% block title %}Sign Out | Hiredar{% endblock %}

{% block content %}
<div class="hero min-h-screen bg-base-200">
    <div class="hero-content flex-col">
        <div class="card flex-shrink-0 w-full max-w-md shadow-2xl bg-base-100">
            <div class="card-body">
                <h2 class="text-2xl font-bold text-center mb-4">Sign Out</h2>
                
                <p class="text-center mb-6">Are you sure you want to sign out?</p>
                
                <form method="post" action="{% url 'authentication:logout' %}">
                    {% csrf_token %}
                    {% if redirect_field_value %}
                        <input type="hidden" name="{{ redirect_field_name }}" value="{{ redirect_field_value }}"/>
                    {% endif %}
                    
                    <div class="flex flex-col gap-4">
                        <button type="submit" class="btn btn-primary">{% trans "Yes, Log Out" %}</button>
                        <a href="{% url 'core:home' %}" class="btn btn-outline">No, Go Back</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
