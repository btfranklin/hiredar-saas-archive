<fieldset class="{{ outer_class|default:'fieldset space-y-2 mb-4 w-full' }}">
  {% if legend %}
  <legend class="sr-only">{{ legend }}</legend>
  {% endif %}
  <div class="{{ wrapper_class|default:'flex gap-2' }}">
    {% if input_type == 'textarea' %}
      <textarea id="{{ id }}" name="{{ name }}" rows="3" class="{{ widget_class|default:'textarea textarea-bordered flex-1' }}"{% if placeholder %} placeholder="{{ placeholder }}"{% endif %}{% if extra_attrs %} {{ extra_attrs|safe }}{% endif %}></textarea>
    {% else %}
      <input id="{{ id }}" name="{{ name }}" type="{{ input_type|default:'text' }}" class="{{ widget_class|default:'input input-bordered flex-1' }}"{% if placeholder %} placeholder="{{ placeholder }}"{% endif %}{% if extra_attrs %} {{ extra_attrs|safe }}{% endif %}/>
    {% endif %}
    <button type="submit" class="{{ button_class|default:'btn btn-primary' }}">
      {% if button_icon %}<i class="{{ button_icon }}"></i>{% endif %}
      {% if button_label %}<span class="{{ button_label_class|default:'ml-2' }}">{{ button_label }}</span>{% endif %}
    </button>
  </div>
</fieldset>
