<!-- Job Seeker Sidebar -->
<div class="w-full lg:w-1/4">
    <div class="bg-base-200 rounded-box p-6 shadow-md">
        <div class="flex flex-col items-center text-center mb-6">
            {% if user.profile_picture %}
                <img src="{{ user.profile_picture.url }}" alt="{{ user.get_full_name }}" class="w-20 h-20 rounded-full object-cover mb-4">
            {% else %}
                <div class="avatar placeholder mb-4">
                    <div class="bg-neutral text-neutral-content rounded-full w-20">
                        <span class="text-xl">{{ user.get_initials }}</span>
                    </div>
                </div>
            {% endif %}
            
            <h1 class="text-xl font-bold">{{ user.get_full_name }}</h1>
            <p class="text-sm text-base-content/70">{{ user.email }}</p>
            <div id="tagline-container" class="bg-primary text-primary-content p-2 rounded-md mt-3 text-sm max-w-full text-center">
                {{ personal_tagline }}
            </div>
        </div>
        
        <div class="divider"></div>
        
        <ul class="menu bg-base-200 w-full p-0">
            <li><a href="{% url 'job_seekers:dashboard' %}" class="{% if active_page == 'dashboard' %}active{% endif %}">
                <i class="fas fa-home mr-2"></i>Dashboard
            </a></li>
            <li><a href="{% url 'job_seekers:profile' %}" class="{% if active_page == 'profile' %}active{% endif %}">
                <i class="fas fa-user mr-2"></i>Profile
            </a></li>
            <li><a href="{% url 'job_seekers:role_recommendations' %}" class="{% if active_page == 'role_recommendations' %}active{% endif %}">
                <i class="fas fa-briefcase mr-2"></i>Recommended Roles
            </a></li>
            <li><a href="{% url 'messaging:conversations' %}" class="{% if active_page == 'messages' %}active{% endif %}">
                <i class="fas fa-envelope mr-2"></i>Messages
            </a></li>
            <li><a href="{% url 'job_seekers:settings' %}" class="{% if active_page == 'settings' %}active{% endif %}">
                <i class="fas fa-cog mr-2"></i>Settings
            </a></li>
        </ul>
    </div>
</div>
