{% if skills_list %}
<div class="card bg-base-200 shadow-md">
  <div class="card-body">
    <h2 class="card-title">Skills</h2>
    <div class="flex flex-wrap gap-2 mt-2">
      {% for skill in skills_list %}
        <span class="badge badge-primary">{{ skill }}</span>
      {% endfor %}
    </div>
  </div>
</div>
{% endif %}
