{% comment %}Shown when user exceeded daily upgrade limit{% endcomment %}
<div class="text-center p-6">
  <p class="text-error font-semibold mb-4">You have reached the daily limit for resume upgrades. Please try again tomorrow.</p>
</div>

<!-- OOB swap to ensure button becomes disabled -->
<button id="upgrade-btn" hx-swap-oob="true" class="btn btn-disabled" disabled title="Daily limit reached">
  <i class="fas fa-ban mr-2"></i>
  Upgrade Resume (limit reached)
</button>
