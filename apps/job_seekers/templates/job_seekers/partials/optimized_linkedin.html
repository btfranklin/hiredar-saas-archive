{% load static %}
<div id="optimized-linkedin-content">
  <h2 class="text-xl font-semibold mb-2">LinkedIn Headline</h2>
  <div class="bg-base-100 p-4 rounded-box relative mb-6">
    <p id="headline-text" class="m-0 pr-20">{{ headline }}</p>
    <button class="btn btn-secondary btn-sm absolute top-2 right-2" onclick="navigator.clipboard.writeText('{{ headline|escapejs }}')">
      <i class="fas fa-copy mr-1"></i>Copy
    </button>
  </div>

  <h2 class="text-xl font-semibold mb-2">About Section</h2>
  <div class="bg-base-100 p-4 rounded-box relative">
    <pre id="about-text" class="whitespace-pre-wrap font-sans pr-20">{{ about }}</pre>
    <button class="btn btn-secondary btn-sm absolute top-2 right-2" onclick="navigator.clipboard.writeText('{{ about|escapejs }}')">
      <i class="fas fa-copy mr-1"></i>Copy
    </button>
  </div>

  {% if remaining_generations > 0 %}
    <!-- Out-of-band swap for Try Again button -->
    <button id="linkedin-btn" hx-swap-oob="true"
            hx-post="" hx-target="#linkedin-output" hx-swap="innerHTML"
            class="btn btn-primary mt-6">
      <span class="htmx-indicator hidden loading loading-spinner loading-xs mr-2"></span>
      <i class="fas fa-sync-alt mr-2"></i>
      {% if remaining_generations <= 2 %}Try Again ({{ remaining_generations }} left){% else %}Try Again{% endif %}
    </button>
  {% else %}
    <button id="linkedin-btn" hx-swap-oob="true" class="btn btn-disabled mt-6" disabled title="Daily limit reached">
      <i class="fas fa-ban mr-2"></i>
      Daily limit reached
    </button>
  {% endif %}
</div>
