{% load static %}

<div class="chat {% if message.sender == request.user %}chat-end{% endif %}">
    <div class="chat-image avatar">
        <div class="w-10 rounded-full">
            <div class="bg-neutral text-neutral-content w-full h-full flex items-center justify-center">
                <span class="text-sm">{{ message.sender.get_initials }}</span>
            </div>
        </div>
    </div>
    <div class="chat-header">
        {% if message.sender == request.user %}
            You
        {% else %}
            {{ message.sender.get_full_name }}
        {% endif %}
        <time class="text-xs opacity-50 ml-2">{{ message.created_at|date:"M d, g:i a" }}</time>
    </div>
    <div class="chat-bubble {% if message.sender == request.user %}chat-bubble-primary{% endif %}">
        {{ message.content }}
    </div>
    {% if message.is_read and message.sender == request.user %}
        <div class="chat-footer opacity-50">
            Read
        </div>
    {% endif %}
</div>
