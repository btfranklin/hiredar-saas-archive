<div id="bulk-upload-form-container" hx-boost="true" hx-target="#bulk-upload-form-container" hx-swap="innerHTML">
  <form method="post" action="{% url 'recruiters:bulk_upload_create' %}" enctype="multipart/form-data" id="bulk-upload-form" class="space-y-4">
    {% csrf_token %}

    {% if form.non_field_errors %}
      <div class="alert alert-error">
        {% for err in form.non_field_errors %}
          <div>{{ err }}</div>
        {% endfor %}
      </div>
    {% endif %}

    <div class="form-control">
      <label class="label">
        <span class="label-text font-semibold">Pool Name</span>
      </label>
      {{ form.name }}
      {{ form.name.errors }}
    </div>
    <div class="form-control">
      <label class="label">
        <span class="label-text font-semibold">ZIP file of resumes (PDF, DOCX, RTF, ODT, TXT)</span>
      </label>
      {{ form.zip_file }}
      {{ form.zip_file.errors }}
    </div>
    <button type="submit" class="btn btn-primary w-full">Upload &amp; Start Processing</button>
  </form>
</div>
