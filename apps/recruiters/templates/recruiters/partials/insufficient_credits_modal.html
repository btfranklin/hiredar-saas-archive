<dialog id="insufficient-credits-modal" class="modal" open>
  <div class="modal-box">
    <h3 class="font-bold text-lg">Not Enough Credits</h3>
    <p class="py-4">{{ message }}</p>
    <div class="modal-action">
      <form method="dialog">
        <button class="btn btn-ghost">Cancel</button>
      </form>
      <a href="{{ credits_url }}" class="btn btn-primary">Buy Credits</a>
    </div>
  </div>
</dialog>
